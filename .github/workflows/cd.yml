on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
 
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with: 
          version: '>=363.0.0'

      - name: Build image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-500321/notely-ar-repo/gglesner/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-500321/notely-ar-repo/gglesner/notely:latest --region us-central1 --allow-unauthenticated --project notely-500321 --max-instances=4
